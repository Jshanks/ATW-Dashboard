# Production deployment example
services:
  atw-dashboard:
    image: ghcr.io/yourusername/atw-dashboard:latest
    container_name: atw-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - atw-data:/app/data
    environment:
      - LOG_LEVEL=info
      - DASHBOARD_TITLE=ATW Dashboard
      - POLL_INTERVAL=5
      - RECONNECT_BASE=5
      - RECONNECT_MAX=60

volumes:
  atw-data:
