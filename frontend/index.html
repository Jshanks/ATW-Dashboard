<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATW Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: {
                surface: { DEFAULT: '#1a1a2e', light: '#16213e', lighter: '#0f3460' },
                accent: { DEFAULT: '#e94560', light: '#ff6b6b' },
            }}}
        }
    </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

    <!-- Header -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold text-white">
                    <span class="text-red-500">ATW</span> Dashboard
                </h1>
                <div id="connection-badge" class="flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium bg-gray-800">
                    <span id="ws-indicator" class="w-2 h-2 rounded-full bg-red-500"></span>
                    <span id="ws-status-text">Disconnected</span>
                </div>
            </div>
            <div class="flex items-center gap-6 text-sm flex-wrap">
                <div class="flex items-center gap-2">
                    <span class="text-gray-400">Online:</span>
                    <span id="total-online" class="text-green-400 font-bold">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-400">Offline:</span>
                    <span id="total-offline" class="text-red-400 font-bold">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-400">Active:</span>
                    <span id="total-items" class="text-blue-400 font-bold">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-400">&#x2193;</span>
                    <span id="total-dl" class="text-cyan-400 font-bold">0 B/s</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-400">&#x2191;</span>
                    <span id="total-ul" class="text-orange-400 font-bold">0 B/s</span>
                </div>
                <button id="btn-settings-panel" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Bulk Settings
                </button>
                <button id="btn-add-instance" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Add Instance
                </button>
            </div>
        </div>
    </header>

    <!-- Tracker Stats Bar -->
    <div id="tracker-bar" class="hidden bg-gray-900/50 border-b border-gray-800 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center gap-6 text-sm flex-wrap" id="tracker-stats-content"></div>
    </div>

    <!-- 24h Activity Chart -->
    <div class="bg-gray-900/30 border-b border-gray-800 px-6 py-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-sm font-medium text-gray-400">Activity — Last 24 Hours</h2>
                <div class="flex gap-2">
                    <button id="chart-data-btn" class="text-xs px-3 py-1 rounded bg-cyan-900/50 text-cyan-400 border border-cyan-800">Total Data</button>
                    <button id="chart-items-btn" class="text-xs px-3 py-1 rounded bg-gray-800 text-gray-400 border border-gray-700">Items Done</button>
                </div>
            </div>
            <canvas id="bw-chart" height="120"></canvas>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="hidden bg-gray-900 border-b border-gray-800 px-6 py-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Bulk Settings</h2>
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox" id="select-all" class="rounded bg-gray-700 border-gray-600" checked>
                    <span>Select All Instances</span>
                </label>
            </div>
            <div id="instance-checkboxes" class="flex flex-wrap gap-3 mb-6"></div>
            <div class="mb-4 flex items-center gap-3">
                <label class="text-sm text-gray-400">Change Project:</label>
                <select id="project-select" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none min-w-[200px]">
                    <option value="">-- Select Project --</option>
                </select>
                <button id="btn-apply-project" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg transition-colors text-sm font-medium">Apply Project</button>
                <span id="project-status" class="text-sm ml-2"></span>
            </div>
            <form id="settings-form" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div><label class="block text-sm text-gray-400 mb-1">Nickname</label><input type="text" name="downloader" placeholder="Leave blank to skip" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">Concurrent Items</label>
                    <select name="concurrent_items" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none">
                        <option value="">Skip</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    </select>
                </div>
                <div><label class="block text-sm text-gray-400 mb-1">HTTP Username</label><input type="text" name="http_username" placeholder="Leave blank to skip" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">HTTP Password</label><input type="password" name="http_password" placeholder="Leave blank to skip" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">Rsync Threads</label><input type="number" name="shared_rsync_threads" min="1" max="40" placeholder="Skip" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
            </form>
            <div class="mt-4 flex gap-3">
                <button id="btn-apply-settings" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg transition-colors text-sm font-medium">Apply Settings</button>
                <button id="btn-close-settings" class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-lg transition-colors text-sm font-medium">Close</button>
                <span id="settings-status" class="text-sm self-center ml-4"></span>
            </div>
        </div>
    </div>

    <!-- Add Instance Modal -->
    <div id="add-instance-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full max-w-md">
            <h2 class="text-lg font-semibold mb-4">Add Warrior Instance</h2>
            <form id="add-instance-form" class="space-y-3">
                <div><label class="block text-sm text-gray-400 mb-1">Name</label><input type="text" name="name" required placeholder="warrior-1" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">Host</label><input type="text" name="host" required placeholder="192.168.1.100" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">Port</label><input type="number" name="port" value="8001" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">HTTP Username (optional)</label><input type="text" name="http_username" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">HTTP Password (optional)</label><input type="password" name="http_password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg text-sm font-medium transition-colors">Add</button>
                    <button type="button" id="btn-cancel-add" class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-lg text-sm font-medium transition-colors">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Instance Modal -->
    <div id="edit-instance-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full max-w-md">
            <h2 class="text-lg font-semibold mb-4">Edit Warrior Instance</h2>
            <form id="edit-instance-form" class="space-y-3">
                <div><label class="block text-sm text-gray-400 mb-1">Name</label><input type="text" name="name" readonly class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-400 cursor-not-allowed outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">Host</label><input type="text" name="host" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">Port</label><input type="number" name="port" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">HTTP Username</label><input type="text" name="http_username" placeholder="Leave blank to clear" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="block text-sm text-gray-400 mb-1">HTTP Password</label><input type="password" name="http_password" placeholder="Leave blank to clear" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg text-sm font-medium transition-colors">Save</button>
                    <button type="button" id="btn-cancel-edit" class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-lg text-sm font-medium transition-colors">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Instance Grid -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        <div id="instance-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div class="col-span-full text-center text-gray-500 py-12">
                <p class="text-lg">No warrior instances yet.</p>
                <p class="text-sm mt-2">Click <strong>Add Instance</strong> to connect your first warrior.</p>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-2 z-50"></div>
    <script src="/static/js/app.js"></script>
</body>
</html>
